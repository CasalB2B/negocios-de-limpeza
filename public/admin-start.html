<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NL Admin</title>
  <link rel="manifest" href="/manifest-admin.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NL Admin" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    .logo {
      width: 72px; height: 72px;
      background: #a163ff;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    p { color: #94a3b8; font-size: 14px; }
    .dots { display: flex; gap: 6px; margin-top: 8px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #a163ff;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
  <script>
    // Verifica sessão e redireciona para o lugar certo
    var dest = localStorage.getItem('auth_admin') === 'true'
      ? '/#/admin/dashboard'
      : '/#/admin/login';
    window.location.replace(dest);
  </script>
</head>
<body>
  <div class="logo">✦</div>
  <p>Carregando painel...</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
